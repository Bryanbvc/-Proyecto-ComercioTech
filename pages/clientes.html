<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clientes — ComercioTech</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/estilos.css" />
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="../index.html">
        <i class="bi bi-shop me-2"></i>ComercioTech
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="../index.html"><i class="bi bi-house me-1"></i>Inicio</a></li>
          <li class="nav-item" data-nav="clientes"><a class="nav-link active" href="clientes.html"><i class="bi bi-people me-1"></i>Clientes</a></li>
          <li class="nav-item"><a class="nav-link" href="productos.html"><i class="bi bi-box-seam me-1"></i>Productos</a></li>
          <li class="nav-item" data-nav="pedidos"><a class="nav-link" href="pedidos.html" id="link-pedidos"><i class="bi bi-cart me-1"></i>Pedidos</a></li>
        </ul>
        <div class="d-flex align-items-center ms-3" id="nav-usuario"></div>
      </div>
    </div>
  </nav>

  <!-- CONTENIDO PRINCIPAL -->
  <div class="container my-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="fw-bold"><i class="bi bi-people me-2 text-primary"></i>Gestión de Clientes</h2>
      <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalCliente" onclick="prepararFormulario()">
        <i class="bi bi-plus-circle me-1"></i>Nuevo Cliente
      </button>
    </div>

    <!-- Tabla de clientes -->
    <div class="card tabla-datos">
      <div class="card-body p-0">
        <table class="table table-hover mb-0">
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Email</th>
              <th class="col-ocultar-movil">Teléfono</th>
              <th class="col-ocultar-movil">Ciudad</th>
              <th>Estado</th>
              <th class="text-center">Acciones</th>
            </tr>
          </thead>
          <tbody id="tabla-body">
            <tr>
              <td colspan="6" class="text-center py-4">
                <div class="spinner-border text-primary" role="status"></div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <!-- MODAL CREAR / EDITAR CLIENTE -->
  <div class="modal fade" id="modalCliente" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">

        <div class="modal-header bg-primary text-white">
          <h5 class="modal-title" id="modal-titulo">
            <i class="bi bi-person-plus me-2"></i>Nuevo Cliente
          </h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
          <input type="hidden" id="cliente-id" />

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">Nombre completo *</label>
              <input type="text" class="form-control" id="cliente-nombre" placeholder="Ej: Ana García López" />
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">Email *</label>
              <input type="email" class="form-control" id="cliente-email" placeholder="correo@ejemplo.com" />
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Teléfono</label>
            <input type="text" class="form-control" id="cliente-telefono" placeholder="+56912345678" />
          </div>

          <!-- Sección dirección -->
          <hr />
          <h6 class="fw-bold text-muted mb-3">
            <i class="bi bi-geo-alt me-1"></i>Dirección de envío
          </h6>

          <div class="row">
            <div class="col-md-8 mb-3">
              <label class="form-label fw-semibold">Calle y número</label>
              <input type="text" class="form-control" id="cliente-calle" placeholder="Av. Principal 1234" />
            </div>
            <div class="col-md-4 mb-3">
              <label class="form-label fw-semibold">Código postal</label>
              <input type="text" class="form-control" id="cliente-cp" placeholder="7500000" />
            </div>
          </div>

          <div class="row">
            <div class="col-md-4 mb-3">
              <label class="form-label fw-semibold">Ciudad</label>
              <input type="text" class="form-control" id="cliente-ciudad" placeholder="Santiago" />
            </div>
            <div class="col-md-4 mb-3">
              <label class="form-label fw-semibold">Región</label>
              <input type="text" class="form-control" id="cliente-region" placeholder="Metropolitana" />
            </div>
            <div class="col-md-4 mb-3">
              <label class="form-label fw-semibold">País</label>
              <input type="text" class="form-control" id="cliente-pais" placeholder="Chile" value="Chile" />
            </div>
          </div>

          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="cliente-activo" checked />
            <label class="form-check-label" for="cliente-activo">Cliente activo</label>
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-primary" onclick="guardarCliente()">
            <i class="bi bi-save me-1"></i>Guardar
          </button>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/clientes.js"></script>

  <script>
  // Mostrar usuario y botón logout en páginas internas
  window.addEventListener("DOMContentLoaded", () => {
    if (!verificarSesion()) return;

    const navUsuario = document.getElementById("nav-usuario");
    const nombre = obtenerNombre();
    const rol    = obtenerRol();
    aplicarNavbarPorRol();
    if (navUsuario) {
      navUsuario.innerHTML = `
        <span class="navbar-text text-white me-3">
          <i class="bi bi-person-circle me-1"></i>
          ${nombre}
          <span class="badge bg-warning text-dark ms-1">${rol}</span>
        </span>
        <button class="btn btn-outline-light btn-sm" onclick="cerrarSesion()">
          <i class="bi bi-box-arrow-right me-1"></i>Cerrar Sesión
        </button>
      `;
    }
  });
</script>

</body>
</html>
