<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar Sesión — ComercioTech</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/estilos.css" />
  <style>
    /* Tarjeta de selección de rol */
    .card-rol {
      cursor: pointer;
      border: 2px solid transparent;
      border-radius: 16px;
      transition: all 0.25s ease;
    }
    .card-rol:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.12);
    }
    .card-rol.seleccionado {
      border-color: #0d6efd;
      background-color: #f0f6ff;
    }
    .card-rol .icono-rol {
      width: 60px; 
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 0.75rem;
      font-size: 1.6rem;
    }
    /* Animación de entrada del formulario */
    #seccion-formulario {
      transition: all 0.3s ease;
    }
  </style>
</head>

<body class="bg-light">

  <div class="container d-flex justify-content-center align-items-center min-vh-100 py-4">
    <div class="col-md-6 col-lg-5">

      <!-- Card principal -->
      <div class="card shadow-lg border-0 rounded-4">

        <!-- Header -->
        <div class="card-header bg-primary text-white text-center py-4 rounded-top-4">
          <i class="bi bi-shop fs-1 d-block mb-2"></i>
          <h4 class="fw-bold mb-0">ComercioTech</h4>
          <small class="opacity-75">Sistema de Gestión</small>
        </div>

        <div class="card-body p-4">

          <!-- ── PASO 1: Selección de tipo de usuario ── -->
          <div id="seccion-roles">
            <p class="text-center text-muted fw-semibold mb-3">
              <i class="bi bi-person-check me-1"></i>¿Cómo deseas ingresar?
            </p>

            <div class="row g-3 mb-4">

              <!-- Administrador -->
              <div class="col-4">
                <div
                  class="card-rol card text-center p-3"
                  onclick="seleccionarRol('admin')"
                  id="rol-admin"
                >
                  <div class="icono-rol bg-primary-subtle">
                    <i class="bi bi-shield-lock-fill text-primary"></i>
                  </div>
                  <p class="fw-semibold mb-0 small">Administrador</p>
                  <small class="text-muted" style="font-size:0.7rem">Acceso total</small>
                </div>
              </div>

              <!-- Trabajador / Ventas -->
              <div class="col-4">
                <div
                  class="card-rol card text-center p-3"
                  onclick="seleccionarRol('ventas')"
                  id="rol-ventas"
                >
                  <div class="icono-rol bg-success-subtle">
                    <i class="bi bi-briefcase-fill text-success"></i>
                  </div>
                  <p class="fw-semibold mb-0 small">Trabajador</p>
                  <small class="text-muted" style="font-size:0.7rem">Área de ventas</small>
                </div>
              </div>

              <!-- Cliente -->
              <div class="col-4">
                <div
                  class="card-rol card text-center p-3"
                  onclick="seleccionarRol('cliente')"
                  id="rol-cliente"
                >
                  <div class="icono-rol bg-warning-subtle">
                    <i class="bi bi-person-fill text-warning"></i>
                  </div>
                  <p class="fw-semibold mb-0 small">Cliente</p>
                  <small class="text-muted" style="font-size:0.7rem">Mis pedidos</small>
                </div>
              </div>

            </div>
          </div>

          <!-- ── PASO 2: Formulario de login (oculto hasta seleccionar rol) ── -->
          <div id="seccion-formulario" class="d-none">

            <!-- Indicador del rol seleccionado -->
            <div class="alert alert-primary py-2 mb-3 d-flex align-items-center" id="alerta-rol-seleccionado">
              <i class="bi bi-person-circle me-2"></i>
              <span id="texto-rol-seleccionado"></span>
              <button
                class="btn btn-sm btn-link ms-auto text-primary p-0"
                onclick="cambiarRol()"
              >
                Cambiar
              </button>
            </div>

            <!-- Mensaje de error -->
            <div id="alerta-login" class="alert alert-danger d-none mb-3">
              <i class="bi bi-exclamation-triangle me-2"></i>
              <span id="mensaje-error"></span>
            </div>

            <!-- Campos del formulario -->
            <div class="mb-3">
              <label class="form-label fw-semibold">Email</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                <input
                  type="email"
                  class="form-control"
                  id="login-email"
                  placeholder="correo@ejemplo.com"
                  autocomplete="email"
                />
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label fw-semibold">Contraseña</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-key"></i></span>
                <input
                  type="password"
                  class="form-control"
                  id="login-password"
                  placeholder="Tu contraseña"
                  autocomplete="current-password"
                />
                <button class="btn btn-outline-secondary" type="button" onclick="togglePassword()">
                  <i class="bi bi-eye" id="icono-password"></i>
                </button>
              </div>
            </div>

            <button
              class="btn btn-primary w-100 py-2 fw-bold"
              onclick="iniciarSesion()"
              id="btn-login"
            >
              <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
            </button>

          </div>

          <!-- Link registro -->
          <hr class="my-3" />
          <div class="text-center">
            <small class="text-muted">¿No tienes cuenta?</small>
            <a href="#" class="ms-1 text-primary fw-semibold">Regístrate aquí</a>
          </div>

        </div>

        <div class="card-footer text-center text-muted py-3 rounded-bottom-4">
          <small>FastAPI + MongoDB + Bootstrap 5</small>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const API_URL = window.API_URL || "";

    // Emails de ejemplo por rol para orientar al usuario
    const emailsEjemplo = {
      admin:   "admin@comerciotech.com",
      ventas:  "ventas@comerciotech.com",
      cliente: "cliente@comerciotech.com"
    };

    const etiquetasRol = {
      admin:  "Administrador — Acceso total al sistema",
      ventas: "Trabajador — Área de ventas",
      cliente:"Cliente — Gestión de mis pedidos"
    };

    let rolSeleccionado = null;

    // Si ya hay sesión activa, ir al dashboard
    window.addEventListener("DOMContentLoaded", () => {
      if (sessionStorage.getItem("token")) {
        window.location.href = "../index.html";
      }
    });

    /**
     * Maneja la selección de tipo de usuario.
     * Resalta la card seleccionada y muestra el formulario.
     */
    function seleccionarRol(rol) {
      rolSeleccionado = rol;

      // Quitar selección anterior
      document.querySelectorAll(".card-rol").forEach(c =>
        c.classList.remove("seleccionado")
      );

      // Marcar card seleccionada
      document.getElementById(`rol-${rol}`).classList.add("seleccionado");

      // Mostrar formulario con animación
      const formulario = document.getElementById("seccion-formulario");
      formulario.classList.remove("d-none");

      // Mostrar etiqueta del rol seleccionado
      document.getElementById("texto-rol-seleccionado").textContent =
        etiquetasRol[rol];

      // Prellenar email de ejemplo como placeholder
      document.getElementById("login-email").placeholder =
        emailsEjemplo[rol];

      // Enfocar el campo de email
      document.getElementById("login-email").focus();
    }

    /**
     * Permite volver a la selección de rol.
     */
    function cambiarRol() {
      rolSeleccionado = null;
      document.querySelectorAll(".card-rol").forEach(c =>
        c.classList.remove("seleccionado")
      );
      document.getElementById("seccion-formulario").classList.add("d-none");
      document.getElementById("alerta-login").classList.add("d-none");
    }

    /**
     * Envía las credenciales a la API y guarda el token JWT.
     */
    async function iniciarSesion() {
      const email    = document.getElementById("login-email").value.trim();
      const password = document.getElementById("login-password").value;
      const btnLogin = document.getElementById("btn-login");

      if (!email || !password) {
        mostrarError("Por favor ingresa tu email y contraseña.");
        return;
      }

      btnLogin.disabled = true;
      btnLogin.innerHTML =
        '<span class="spinner-border spinner-border-sm me-2"></span>Ingresando...';

      try {
        const respuesta = await fetch(`${API_URL}/auth/login`, {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify({ email, password })
        });

        const datos = await respuesta.json();

        if (!respuesta.ok) {
          mostrarError(datos.detail || "Credenciales incorrectas.");
          return;
        }

        // Guardar sesión
        sessionStorage.setItem("token",       datos.access_token);
        sessionStorage.setItem("rol",         datos.rol);
        sessionStorage.setItem("nombre",      datos.nombre);
        sessionStorage.setItem("recien_login","true");

        // Ir al dashboard
        window.location.href = "../index.html";

      } catch {
        mostrarError("No se pudo conectar con el servidor.");
      } finally {
        btnLogin.disabled = false;
        btnLogin.innerHTML =
          '<i class="bi bi-box-arrow-in-right me-2"></i>Ingresar';
      }
    }

    function mostrarError(mensaje) {
      const alerta = document.getElementById("alerta-login");
      document.getElementById("mensaje-error").textContent = mensaje;
      alerta.classList.remove("d-none");
    }

    function togglePassword() {
      const input = document.getElementById("login-password");
      const icono = document.getElementById("icono-password");
      const esText = input.type === "text";
      input.type  = esText ? "password" : "text";
      icono.className = esText ? "bi bi-eye" : "bi bi-eye-slash";
    }

    document.addEventListener("keydown", e => {
      if (e.key === "Enter" && rolSeleccionado) iniciarSesion();
    });
  </script>

</body>
</html>
