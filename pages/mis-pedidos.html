<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mis Pedidos — ComercioTech</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/estilos.css" />
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="../index.html">
        <i class="bi bi-shop me-2"></i>ComercioTech
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="../index.html"><i class="bi bi-house me-1"></i>Inicio</a></li>
          <li class="nav-item" data-nav="clientes"><a class="nav-link" href="clientes.html"><i class="bi bi-people me-1"></i>Clientes</a></li>
          <li class="nav-item"><a class="nav-link" href="productos.html"><i class="bi bi-box-seam me-1"></i>Productos</a></li>
          <li class="nav-item" data-nav="pedidos"><a class="nav-link active" href="mis-pedidos.html" id="link-pedidos"><i class="bi bi-cart me-1"></i>Mis Pedidos</a></li>
        </ul>
        <div class="d-flex align-items-center ms-3" id="nav-usuario"></div>
      </div>
    </div>
  </nav>

  <!-- CONTENIDO -->
  <div class="container my-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="fw-bold"><i class="bi bi-cart me-2 text-warning"></i>Mis Pedidos</h2>
      <button class="btn btn-warning" data-bs-toggle="modal" data-bs-target="#modalPedido" onclick="prepararFormulario()">
        <i class="bi bi-plus-circle me-1"></i>Nuevo Pedido
      </button>
    </div>

    <!-- Tabla de mis pedidos -->
    <div class="card tabla-datos">
      <div class="card-body p-0">
        <table class="table table-hover mb-0">
          <thead>
            <tr>
              <th>ID</th>
              <th>Fecha</th>
              <th>Items</th>
              <th>Total</th>
              <th>Estado</th>
              <th class="text-center">Acciones</th>
            </tr>
          </thead>
          <tbody id="tabla-body">
            <tr>
              <td colspan="6" class="text-center py-4">
                <div class="spinner-border text-warning" role="status"></div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- MODAL: Nuevo Pedido (sin selector de cliente — se asocia automáticamente) -->
  <div class="modal fade" id="modalPedido" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">

        <div class="modal-header bg-warning">
          <h5 class="modal-title"><i class="bi bi-cart-plus me-2"></i>Nuevo Pedido</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
          <hr />
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h6 class="fw-bold mb-0"><i class="bi bi-list-ul me-1"></i>Productos del pedido</h6>
            <button type="button" class="btn btn-sm btn-outline-warning" onclick="agregarItem()">
              <i class="bi bi-plus me-1"></i>Agregar producto
            </button>
          </div>

          <div id="items-container"></div>

          <div class="alert alert-light border mt-3">
            <strong>Total del pedido:</strong>
            <span class="fs-5 fw-bold text-success ms-2" id="total-pedido">$0</span>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Notas</label>
            <textarea class="form-control" id="pedido-notas" rows="2" placeholder="Instrucciones especiales..."></textarea>
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-warning" onclick="guardarPedido()">
            <i class="bi bi-save me-1"></i>Guardar
          </button>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/mis-pedidos.js"></script>

  <script>
  window.addEventListener("DOMContentLoaded", () => {
    if (!verificarSesion()) return;

    if (obtenerRol() !== "cliente") {
      window.location.href = "../index.html";
      return;
    }

    const navUsuario = document.getElementById("nav-usuario");
    const nombre = obtenerNombre();
    const rol = obtenerRol();

    if (navUsuario) {
      navUsuario.innerHTML = `
        <span class="navbar-text text-white me-3">
          <i class="bi bi-person-circle me-1"></i>
          ${nombre}
          <span class="badge bg-warning text-dark ms-1">${rol}</span>
        </span>
        <button class="btn btn-outline-light btn-sm" onclick="cerrarSesion()">
          <i class="bi bi-box-arrow-right me-1"></i>Cerrar Sesión
        </button>
      `;
    }

    aplicarNavbarPorRol();
  });
  </script>

</body>
</html>
